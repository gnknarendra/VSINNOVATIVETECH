<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Innovative Tech | SAP Excellence</title>
    <style>
        :root { --bg: #030712; --accent: #38bdf8; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; line-height: 1.6; }
        
        /* The Modern Hero Section */
        .hero { display: flex; align-items: center; justify-content: space-around; padding: 100px 5%; min-height: 80vh; gap: 40px; flex-wrap: wrap; }
        .hero-text { flex: 1; min-width: 300px; }
        .hero-text h1 { font-size: 3.5rem; margin-bottom: 20px; background: linear-gradient(90deg, #fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Glassmorphism Card (The Code Window) */
        .glass-card { flex: 1; min-width: 300px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .dots { display: flex; gap: 8px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        
        /* Button Style */
        .btn { background: var(--accent); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; transition: 0.3s; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 0 25px rgba(56, 189, 248, 0.5); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-text">
            <h1>VS Innovative Tech</h1>
            <p style="font-size: 1.2rem; color: #94a3b8;">Transform your career with Advanced SAP S/4 HANA Training. Learn from the best in Vijayawada.</p>
            <br>
            <a href="https://wa.me" class="btn">Enroll for 2026 Batch</a>
        </div>
        <div class="glass-card">
            <div class="dots">
                <div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#ffbd2e"></div><div class="dot" style="background:#27c93f"></div>
            </div>
            <pre style="color: #38bdf8; font-family: monospace;">
class SAP_Expert:
    def career_path(self):
        return "Global Success"

# VS Innovative Tech
# Training | Consulting | Jobs
            </pre>
        </div>
    </div>
</body>
</html>
